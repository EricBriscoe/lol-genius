name: Build Electron

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-flag: --win
            sidecar-name: shap_predict.exe
          - os: macos-latest
            build-flag: --mac
            sidecar-name: shap_predict
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci

      - name: Build SHAP sidecar
        run: |
          pip install pyinstaller xgboost shap numpy pandas
          pyinstaller --onefile --name shap_predict sidecar/shap_predict.py
        shell: bash

      - name: Copy sidecar to extraResources
        run: |
          mkdir -p sidecar/dist
          cp dist/${{ matrix.sidecar-name }} sidecar/dist/
        shell: bash

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.build-flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          for f in dist-electron/*.exe dist-electron/*.dmg; do
            [ -f "$f" ] && gh release upload "$tag" "$f" --clobber
          done
        shell: bash
