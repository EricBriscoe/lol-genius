name: Build Electron

on:
  push:
    tags:
      - "v*"

concurrency:
  group: electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-flag: --win
            sidecar-name: shap_predict.exe
          - os: macos-latest
            build-flag: --mac
            sidecar-name: shap_predict
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: electron-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: electron-app/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('electron-app/package-lock.json') }}

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch Data Dragon champion data
        run: |
          python -c "
          import urllib.request, json, os
          versions = json.loads(urllib.request.urlopen('https://ddragon.leagueoflegends.com/api/versions.json').read())
          ver = versions[0]
          raw = json.loads(urllib.request.urlopen(f'https://ddragon.leagueoflegends.com/cdn/{ver}/data/en_US/champion.json').read())['data']
          champs = {}
          for c in raw.values():
              key = int(c['key'])
              champs[str(key)] = {'id': c['id'], 'name': c['name'], 'key': key, 'tags': c.get('tags', []), 'stats': c.get('stats', {}), 'info': c.get('info', {})}
          os.makedirs('../data/ddragon', exist_ok=True)
          with open(f'../data/ddragon/champions_{ver}.json', 'w') as f:
              json.dump(champs, f)
          print(f'Saved {len(champs)} champions for patch {ver}')
          "
        shell: bash

      - name: Build SHAP sidecar
        run: |
          pip install pyinstaller xgboost shap numpy pandas
          pyinstaller --onefile --collect-binaries xgboost --distpath sidecar/dist --name shap_predict sidecar/shap_predict.py
        shell: bash

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          _CSC_LINK: ${{ secrets.CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_CSC_LINK" ]; then
            export CSC_LINK="$_CSC_LINK" CSC_KEY_PASSWORD="$_CSC_KEY_PASSWORD"
            export APPLE_ID="$_APPLE_ID" APPLE_APP_SPECIFIC_PASSWORD="$_APPLE_APP_SPECIFIC_PASSWORD" APPLE_TEAM_ID="$_APPLE_TEAM_ID"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-vite build && npx electron-builder ${{ matrix.build-flag }} --publish always
        shell: bash

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
