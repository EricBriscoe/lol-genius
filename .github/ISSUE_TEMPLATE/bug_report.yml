name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `lol-genius crawl`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or logs.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.12"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Crawler / Data Pipeline
        - Feature Engineering
        - Model Training / Evaluation
        - Electron App
        - Dashboard
        - Proxy
        - Docker
